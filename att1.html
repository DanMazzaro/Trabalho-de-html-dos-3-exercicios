<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meu cartao</title>

    <style>
        .cartao {
            width: 350px;
            margin: 50px auto;
            text-align: center;
        }

        .nome {
            border: 3px solid blue;
            border-radius: 10px;
            padding: 10px;
        }

        img {
            width: 200px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="cartao">
        <h1 class="nome">daniel mazzaro</h1>

        <img src="imagens/spfc.jpg" alt="spfc">

        <p>
            tenho 16 anos, gosto de futebol, futsal,
            academia e jogos.
        </p>
    </div>

</body>
</html>
