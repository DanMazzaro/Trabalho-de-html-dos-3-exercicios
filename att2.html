<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tipos de bordas</title>

    <style>
        .caixa {
            width: 300px;
            padding: 20px;
            margin: 15px;
        }

        .caixa1 {
            border: 3px solid blue;
        }

        .caixa2 {
            border: 3px dashed red;
        }

        .caixa3 {
            border: 3px dotted green;
        }

        .caixa4 {
            border: 5px double purple;
        }
    </style>
</head>
<body>

    <div class="caixa caixa1">
        caixa com borda solid
    </div>

    <div class="caixa caixa2">
        caixa com borda dashed
    </div>

    <div class="caixa caixa3">
        caixa com borda dotted
    </div>

    <div class="caixa caixa4">
        caixa com borda double
    </div>

</body>
</html>
