<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>produtos</title>

    <style>
        .produto {
            width: 250px;
            display: inline-block;
            margin: 15px;
            padding: 15px;
            text-align: center;
        }

        .produto1 {
            border-style: solid;
            border-width: 2px;
            border-color: blue;
            border-radius: 10px;
        }

        .produto2 {
            border-style: dashed;
            border-width: 3px;
            border-color: green;
            border-radius: 20px;
        }

        .produto3 {
            border-style: double;
            border-width: 6px;
            border-color: gold;
            border-radius: 15px;
        }

        img {
            width: 150px;
        }
    </style>
</head>
<body>

    <div class="produto produto1">
        <h2>mouse</h2>
        <img src="imagens/download.jpg" alt="mouse">
        <p>80,00</p>
    </div>

    <div class="produto produto2">
        <h2>teclado</h2>
        <img src="imagens/shopping.webp" alt="teclado">
        <p>250,00</p>
    </div>

    <div class="produto produto3">
        <h2>monitor</h2>
        <img src="imagens/images.jpg" alt="monitor">
        <p>1.200,00</p>
    </div>

</body>
</html>
